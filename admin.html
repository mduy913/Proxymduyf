<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Admin - Đóng Shop</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; text-align: center; padding: 50px 20px; }
        .card { background: white; max-width: 350px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        .status { font-size: 18px; font-weight: bold; margin: 20px 0; padding: 12px; border-radius: 8px; }
        .open { background: #d4edda; color: #155724; }
        .closed { background: #f8d7da; color: #721c24; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-close { background: #ff3b30; } /* Màu đỏ iOS */
        .btn-open { background: #34c759; }  /* Màu xanh iOS */
    </style>
</head>
<body>

<div class="card">
    <h2>🔒 QUẢN TRỊ SHOP</h2>
    
    <div id="statusBox" class="status open">ĐANG HOẠT ĐỘNG</div>

    <button id="actionBtn" class="btn-close" onclick="toggleShop()">🚨 ĐÓNG SHOP KHẨN CẤP</button>
</div>

<script>
    const statusBox = document.getElementById('statusBox');
    const actionBtn = document.getElementById('actionBtn');

    // Hàm cập nhật giao diện dựa vào dữ liệu đã lưu
    function updateUI() {
        const shopStatus = localStorage.getItem('shop_status');

        if (shopStatus === 'closed') {
            statusBox.innerText = "🚫 SHOP ĐANG ĐÓNG CỬA";
            statusBox.className = "status closed";
            actionBtn.innerText = "✅ MỞ LẠI SHOP NGAY";
            actionBtn.className = "btn-open";
        } else {
            statusBox.innerText = "🟢 SHOP ĐANG HOẠT ĐỘNG";
            statusBox.className = "status open";
            actionBtn.innerText = "🚨 ĐÓNG SHOP KHẨN CẤP";
            actionBtn.className = "btn-close";
        }
    }

    // Hàm xử lý khi Admin bấm nút
    function toggleShop() {
        const currentStatus = localStorage.getItem('shop_status');
        
        if (currentStatus === 'closed') {
            localStorage.setItem('shop_status', 'open'); // Mở lại shop
        } else {
            localStorage.setItem('shop_status', 'closed'); // Đóng shop
        }
        
        updateUI();
    }

    // Chạy kiểm tra ngay khi vừa mở trang admin
    updateUI();
</script>

</body>
</html>
